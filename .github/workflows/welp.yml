name: Manual CCTV-1 Stream

on:
  workflow_dispatch: # Starts ONLY when you click "Run workflow"

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg and IPTV Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-wqy-zenhei

      - name: Start Live Stream
        env:
          STREAM_URL: "http://198.204.240.250:82/live/cctv1.m3u8"
          RTMP_URL: "rtmp://a.rtmp.youtube.com/live2"
          # Reverted to your standard YouTube Stream Key
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          echo "Starting manual stream to YouTube..."
          
          # The loop keeps the stream alive if the source momentarily drops
          while true; do
            ffmpeg -re -i "$STREAM_URL" \
              -vf "drawtext=fontfile=/usr/share/fonts/truetype/wqy/wqy-zenhei.ttc:text='[BloxyPlay TV] 高清':x=main_w-text_w-20:y=main_h-text_h-20:fontsize=16:fontcolor=white@0.8:box=1:boxcolor=black@0.4:boxborderw=4" \
              -vcodec libx264 -preset veryfast -pix_fmt yuv420p -g 60 \
              -b:v 4500k -maxrate 4500k -bufsize 9000k \
              -acodec aac -b:a 160k -ar 44100 \
              -af "aresample=async=1:min_hard_comp=0.100000:first_pts=0" \
              -fflags +genpts+igndts \
              -f flv "$RTMP_URL/$STREAM_KEY" \
              -loglevel warning
              
            echo "Stream disconnected. Reconnecting in 5 seconds..."
            sleep 5
          done
          
