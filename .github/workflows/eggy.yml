name: Bloxy Play IPTV 24/7 Stream

on:
  workflow_dispatch: 

permissions:
  actions: write 

concurrency:
  group: "iptv-stream"
  cancel-in-progress: true

jobs:
  stream-to-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y

      - name: Start Koryofront Stream Loop (4h limit)
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TZ: "Asia/Yangon"
        run: |
          JOB_START=$(date +%s)
          MAX_RUNTIME=14400 # Exactly 4 hours
          
          while true; do
            CURRENT_EPOCH=$(date +%s)
            ELAPSED=$((CURRENT_EPOCH - JOB_START))
            
            if [ $ELAPSED -ge $MAX_RUNTIME ]; then
              echo "4-hour limit reached. Exiting loop to trigger auto-restart..."
              break
            fi
            
            CURRENT_TIME=$(date +"%H:%M")
            
            # Block 1: Live Football Match (12:00 PM to 2:30 PM)
            # Block 2: Football Highlights (5:40 PM to 6:00 PM)
            if [[ "$CURRENT_TIME" > "12:00" && "$CURRENT_TIME" < "14:30" ]] || \
               [[ "$CURRENT_TIME" > "17:40" && "$CURRENT_TIME" < "18:00" ]]; then
              echo "Protection window active ($CURRENT_TIME). Channel is safely OFFLINE."
              sleep 60
            else
              echo "Streaming KCTV (Original Koryofront Feed) live at $CURRENT_TIME..."
              
              timeout 1800 ffmpeg -hide_banner \
                -reconnect 1 -reconnect_at_eof 1 -reconnect_streamed 1 -reconnect_delay_max 5 \
                -thread_queue_size 512 \
                -i "https://kctv.koryofront.org/stream/index.m3u8" \
                -vf "drawtext=text='https://bloxyplay.github.io/JucheTV-BloxyPlay/':fontcolor=white@0.6:fontsize=38:shadowcolor=black@0.5:shadowx=2:shadowy=2:x=w-tw-30:y=30" \
                -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 9000k -pix_fmt yuv420p -g 60 -r 30 \
                -c:a aac -b:a 128k -ar 44100 \
                -f flv "rtmps://a.rtmp.youtube.com/live2/$YOUTUBE_STREAM_KEY" || true
            fi
            
            echo "Loop cycle finished. Re-evaluating time in 5 seconds..."
            sleep 5
          done

      # THIS STEP NOW USES YOUR CUSTOM PAT TO FORCE THE AUTO-RESTART
      - name: Trigger Next Run (Skipped if Manually Cancelled)
        env:
          GH_TOKEN: ${{ secrets.AUTO_RESTART_TOKEN }}
        run: |
          echo "Automatically starting the next 4-hour workflow using custom PAT..."
          gh workflow run "Bloxy Play IPTV 24/7 Stream"
          
