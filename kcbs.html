<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Central Boardcasting Station</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0c0c0e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e8e8ec;
            overflow: hidden;
            position: relative;
        }

        /* Subtle noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        /* OGL Strands Canvas Background */
        #strands-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 72px 56px;
            background: rgba(20, 20, 22, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.02),
                        0 40px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Radio tower SVG icon */
        .radio-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 36px;
            position: relative;
        }

        .radio-icon svg {
            width: 100%;
            height: 100%;
        }

        .radio-icon .signal-wave {
            stroke: #3a3a42;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }

        .radio-icon .signal-wave.active {
            stroke: #6366f1;
            animation: signalPulse 2.4s ease-in-out infinite;
        }

        .radio-icon .tower {
            fill: #4b4b55;
        }

        .radio-icon .tower-head {
            fill: #6366f1;
        }

        @keyframes signalPulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.8; }
        }

        .radio-icon .slash-line {
            stroke: #ef4444;
            stroke-width: 3;
            stroke-linecap: round;
            opacity: 0;
            animation: slashIn 0.5s ease-out 0.6s forwards;
        }

        @keyframes slashIn {
            from { opacity: 0; stroke-dashoffset: 120; }
            to { opacity: 1; stroke-dashoffset: 0; }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #f0f0f5;
            margin-bottom: 14px;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .message {
            font-size: 1rem;
            color: #6e6e7a;
            line-height: 1.7;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .return-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: #1e1e22;
            color: #e8e8ec;
            text-decoration: none;
            border-radius: 12px;
            font-size: 0.9375rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .return-btn:hover {
            background: #252529;
            border-color: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        .return-btn:active {
            transform: translateY(0);
            background: #1a1a1e;
        }

        .return-btn svg {
            width: 18px;
            height: 18px;
            color: #9ca3af;
            transition: color 0.2s ease;
        }

        .return-btn:hover svg {
            color: #d1d5db;
        }

        .divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 40px auto 0;
        }

        .status {
            margin-top: 24px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8125rem;
            color: #52525b;
            font-weight: 400;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ef4444;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.25);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="strands-canvas"></canvas>

    <div class="card">
        <!-- Radio Tower SVG Icon -->
        <div class="radio-icon">
            <svg viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Signal waves (static gray) -->
                <path class="signal-wave" d="M22 44C22 31.85 31.85 22 44 22C56.15 22 66 31.85 66 44"/>
                <path class="signal-wave" d="M10 44C10 25.22 25.22 10 44 10C62.78 10 78 25.22 78 44"/>
                <!-- Signal waves (active/purple) -->
                <path class="signal-wave active" d="M22 44C22 31.85 31.85 22 44 22C56.15 22 66 31.85 66 44" style="animation-delay: 0s;"/>
                <path class="signal-wave active" d="M10 44C10 25.22 25.22 10 44 10C62.78 10 78 25.22 78 44" style="animation-delay: 0.4s;"/>
                <!-- Tower body -->
                <path class="tower" d="M40 44L32 78H56L48 44H40Z"/>
                <rect class="tower-head" x="38" y="38" width="12" height="8" rx="2"/>
                <circle class="tower-head" cx="44" cy="34" r="3"/>
                <!-- Cross-out slash -->
                <line class="slash-line" x1="18" y1="18" x2="70" y2="70" stroke-dasharray="120" stroke-dashoffset="120"/>
            </svg>
        </div>

        <h1>Radios Unavailable</h1>
        <p class="message">Radios are unavailable right now.<br>Please return to the main menu.</p>

        <a href="https://juche-tv.vercel.app" class="return-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5"/>
                <path d="M12 19l-7-7 7-7"/>
            </svg>
            Return to Main Menu
        </a>

        <div class="divider"></div>

        <div class="status">
            <span class="status-dot"></span>
            <span>Service temporarily offline</span>
        </div>
    </div>

    <script type="module">
        // Minimal OGL implementation for the strands background
        // This is a self-contained WebGL shader background

        const canvas = document.getElementById('strands-canvas');
        const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: true, antialias: true });

        if (!gl) {
            console.warn('WebGL2 not supported, falling back to static background');
            canvas.style.background = '#0c0c0e';
        } else {
            gl.clearColor(0, 0, 0, 0);
            gl.enable(gl.BLEND);
            gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

            const MAX_STRANDS = 12;
            const MAX_COLORS = 8;

            const colors = ['#FF4242', '#7C3AED', '#06B6D4', '#EAB308'];
            const count = 6;
            const speed = 0.3;
            const amplitude = 1;
            const waviness = 1;
            const thickness = 0.7;
            const glow = 2.6;
            const taper = 3;
            const spread = 1;
            const hueShift = 0;
            const intensity = 0.6;
            const saturation = 1.5;
            const opacity = 0.4;
            const scale = 1.5;

            function hexToRGB(hex) {
                const r = parseInt(hex.slice(1, 3), 16) / 255;
                const g = parseInt(hex.slice(3, 5), 16) / 255;
                const b = parseInt(hex.slice(5, 7), 16) / 255;
                return [r, g, b];
            }

            function buildPalette(colors) {
                const filled = colors && colors.length ? colors : ['#ffffff'];
                const padded = [];
                for (let i = 0; i < MAX_COLORS; i++) {
                    const hex = filled[i] ?? filled[filled.length - 1];
                    padded.push(hexToRGB(hex));
                }
                return padded;
            }

            const VERT = `#version 300 es
            in vec2 position;
            void main() {
              gl_Position = vec4(position, 0.0, 1.0);
            }
            `;

            const FRAG = `#version 300 es
            precision highp float;

            uniform float uTime;
            uniform vec2 uResolution;
            uniform vec3 uColors[${MAX_COLORS}];
            uniform int uColorCount;
            uniform int uStrandCount;
            uniform float uSpeed;
            uniform float uAmplitude;
            uniform float uWaviness;
            uniform float uThickness;
            uniform float uGlow;
            uniform float uTaper;
            uniform float uSpread;
            uniform float uHueShift;
            uniform float uIntensity;
            uniform float uOpacity;
            uniform float uScale;
            uniform float uSaturation;

            out vec4 fragColor;

            const float PI = 3.14159265;

            vec3 spectrum(float t) {
              return 0.5 + 0.5 * cos(2.0 * PI * (t + vec3(0.00, 0.33, 0.67)));
            }

            vec3 samplePalette(float t) {
              t = fract(t);
              float scaled = t * float(uColorCount);
              int idx = int(floor(scaled));
              float blend = fract(scaled);
              int nextIdx = idx + 1;
              if (nextIdx >= uColorCount) nextIdx = 0;
              return mix(uColors[idx], uColors[nextIdx], blend);
            }

            vec3 strandColor(float t) {
              if (uColorCount > 0) return samplePalette(t);
              return spectrum(t);
            }

            void main() {
              vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / uResolution.y;
              uv /= max(uScale, 0.0001);

              float e = 0.06 + uIntensity * 0.94;
              float env = pow(max(cos(uv.x * PI * 1.3), 0.0), uTaper);

              vec3 col = vec3(0.0);

              for (int i = 0; i < ${MAX_STRANDS}; i++) {
                if (i >= uStrandCount) break;

                float fi = float(i);
                float ph = fi * 1.7 * uSpread;
                float freq = (2.0 + fi * 0.35) * uWaviness;
                float spd = 1.4 + fi * 1.2;

                float tt = uTime * uSpeed;
                float w = sin(uv.x * freq + tt * spd + ph) * 0.60
                        + sin(uv.x * freq * 1.1 - tt * spd * 0.7 + ph * 1.7) * 0.40;

                float amp = (0.1 + 0.02 * e) * env * uAmplitude;
                float y = w * amp;

                float d = abs(uv.y - y);
                float thick = (0.001 + 0.05 * e) * (0.35 + env) * uThickness;
                float g = thick / (d + thick * 0.45);
                g = g * g;

                float h = fi / float(uStrandCount) + uv.x * 0.30 + uTime * 0.04 + uHueShift;
                col += strandColor(h) * g * env;
              }

              col *= 0.45 + 0.7 * e;
              col = 1.0 - exp(-col * uGlow);

              float gray = dot(col, vec3(0.2126, 0.7152, 0.0722));
              col = max(mix(vec3(gray), col, uSaturation), 0.0);

              float lum = max(max(col.r, col.g), col.b);
              float alpha = clamp(lum, 0.0, 1.0) * uOpacity;

              fragColor = vec4(col * uOpacity, alpha);
            }
            `;

            function createShader(gl, type, source) {
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);
                    return null;
                }
                return shader;
            }

            function createProgram(gl, vertexShader, fragmentShader) {
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error('Program link error:', gl.getProgramInfoLog(program));
                    gl.deleteProgram(program);
                    return null;
                }
                return program;
            }

            const vertexShader = createShader(gl, gl.VERTEX_SHADER, VERT);
            const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, FRAG);
            const program = createProgram(gl, vertexShader, fragmentShader);

            const positionBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
                -1, -1,
                3, -1,
                -1, 3
            ]), gl.STATIC_DRAW);

            const positionLocation = gl.getAttribLocation(program, 'position');
            gl.enableVertexAttribArray(positionLocation);
            gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

            const uniforms = {
                uTime: gl.getUniformLocation(program, 'uTime'),
                uResolution: gl.getUniformLocation(program, 'uResolution'),
                uColors: gl.getUniformLocation(program, 'uColors'),
                uColorCount: gl.getUniformLocation(program, 'uColorCount'),
                uStrandCount: gl.getUniformLocation(program, 'uStrandCount'),
                uSpeed: gl.getUniformLocation(program, 'uSpeed'),
                uAmplitude: gl.getUniformLocation(program, 'uAmplitude'),
                uWaviness: gl.getUniformLocation(program, 'uWaviness'),
                uThickness: gl.getUniformLocation(program, 'uThickness'),
                uGlow: gl.getUniformLocation(program, 'uGlow'),
                uTaper: gl.getUniformLocation(program, 'uTaper'),
                uSpread: gl.getUniformLocation(program, 'uSpread'),
                uHueShift: gl.getUniformLocation(program, 'uHueShift'),
                uIntensity: gl.getUniformLocation(program, 'uIntensity'),
                uOpacity: gl.getUniformLocation(program, 'uOpacity'),
                uScale: gl.getUniformLocation(program, 'uScale'),
                uSaturation: gl.getUniformLocation(program, 'uSaturation')
            };

            const palette = buildPalette(colors);

            function resize() {
                const dpr = Math.min(window.devicePixelRatio, 2);
                canvas.width = window.innerWidth * dpr;
                canvas.height = window.innerHeight * dpr;
                gl.viewport(0, 0, canvas.width, canvas.height);
            }

            window.addEventListener('resize', resize);
            resize();

            let animateId = 0;
            function render(t) {
                animateId = requestAnimationFrame(render);

                gl.useProgram(program);

                gl.uniform1f(uniforms.uTime, t * 0.001);
                gl.uniform2f(uniforms.uResolution, canvas.width, canvas.height);
                gl.uniform3fv(uniforms.uColors, palette.flat());
                gl.uniform1i(uniforms.uColorCount, Math.min(colors.length, MAX_COLORS));
                gl.uniform1i(uniforms.uStrandCount, Math.min(Math.max(Math.round(count), 1), MAX_STRANDS));
                gl.uniform1f(uniforms.uSpeed, speed);
                gl.uniform1f(uniforms.uAmplitude, amplitude);
                gl.uniform1f(uniforms.uWaviness, waviness);
                gl.uniform1f(uniforms.uThickness, thickness);
                gl.uniform1f(uniforms.uGlow, glow);
                gl.uniform1f(uniforms.uTaper, taper);
                gl.uniform1f(uniforms.uSpread, spread);
                gl.uniform1f(uniforms.uHueShift, hueShift);
                gl.uniform1f(uniforms.uIntensity, intensity);
                gl.uniform1f(uniforms.uOpacity, opacity);
                gl.uniform1f(uniforms.uScale, scale);
                gl.uniform1f(uniforms.uSaturation, saturation);

                gl.drawArrays(gl.TRIANGLES, 0, 3);
            }

            animateId = requestAnimationFrame(render);
        }
    </script>
</body>
</html>
