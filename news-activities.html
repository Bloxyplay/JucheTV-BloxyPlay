<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D0D0F">
  <title>News & Kim Jong Un Activities – Juche TV</title>
  <meta name="description" content="Live-fetched KCTV news bulletins and Kim Jong Un activities coverage — watch the latest reports from Korean Central Television.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Juche TV">
  <meta property="og:title" content="News & Kim Jong Un Activities – Juche TV">
  <meta property="og:description" content="Live-fetched KCTV news bulletins and Kim Jong Un activities coverage — watch the latest reports from Korean Central Television.">
  <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/en/a/ad/Korean_Central_Television_2005.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.1/DPlayer.min.css">
  <style>
    :root {
      --bg:         #0D0D0F;
      --surface:    #141417;
      --elevated:   #1C1C21;
      --border:     rgba(255,255,255,0.07);
      --border-hi:  rgba(255,255,255,0.14);
      --primary:    #F0F0F4;
      --secondary:  #8A8A9A;
      --muted:      #46464F;
      --accent:     #E8212A;
      --accent-dim: rgba(232,33,42,0.12);
      --accent-glow:rgba(232,33,42,0.25);
      --gold:       #C8963A;
      --gold-dim:   rgba(200,150,58,0.1);
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.4);
      --shadow-md:  0 4px 20px rgba(0,0,0,0.5);
      --shadow-lg:  0 12px 48px rgba(0,0,0,0.7);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ===================== NAV ===================== */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 56px;
    }
    .logo {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 17px; font-weight: 800; color: var(--primary);
      text-decoration: none; letter-spacing: -0.4px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo-icon svg { width: 16px; height: 16px; fill: #fff; }
    #menu { list-style: none; display: flex; align-items: center; gap: 2px; }
    #menu a {
      font-size: 13px; font-weight: 600; color: var(--secondary);
      text-decoration: none; padding: 6px 12px; border-radius: 8px;
      transition: all 0.2s ease;
    }
    #menu a:hover { color: var(--primary); background: var(--elevated); }
    .nav-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
      background: var(--elevated); color: var(--secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease;
    }
    .nav-btn:hover { border-color: var(--border-hi); color: var(--primary); }
    .nav-btn svg { width: 15px; height: 15px; }

    /* ===================== MAIN ===================== */
    .main {
      flex: 1; width: 100%; max-width: 1200px; margin: 0 auto;
      padding: 28px 20px 60px; position: relative; z-index: 1;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: var(--secondary);
      text-decoration: none; margin-bottom: 18px; transition: color 0.2s ease;
    }
    .back-link:hover { color: var(--primary); }
    .back-link svg { width: 15px; height: 15px; }

    .page-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 22px;
    }
    .page-header-icon {
      width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent-dim), rgba(232,33,42,0.02));
      border: 1px solid rgba(232,33,42,0.28);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); box-shadow: 0 4px 20px rgba(232,33,42,0.15);
    }
    .page-header-icon svg { width: 25px; height: 25px; }
    .page-header-text h1 {
      font-size: 24px; font-weight: 900; letter-spacing: -0.6px;
    }
    .page-header-text h1 span { color: var(--accent); }
    .page-header-text p { font-size: 13px; color: var(--secondary); margin-top: 3px; }

    /* ===================== CATEGORY TABS ===================== */
    .cat-tabs {
      display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 22px;
    }
    .cat-tab {
      font-size: 12px; font-weight: 700; padding: 8px 16px;
      border-radius: 100px; border: 1px solid var(--border);
      background: var(--elevated); color: var(--secondary);
      cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--border-hi); color: var(--primary); }
    .cat-tab.active {
      background: var(--accent-dim); border-color: rgba(232,33,42,0.4);
      color: var(--accent); box-shadow: 0 0 0 1px rgba(232,33,42,0.15) inset;
    }
    .cat-count {
      display: inline-block; margin-left: 6px; font-size: 10px;
      background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 20px;
    }
    .cat-tab.active .cat-count { background: rgba(232,33,42,0.25); }

    /* ===================== PLAYER ===================== */
    .player-shell {
      background: #000; border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: var(--shadow-lg); border: 1px solid var(--border);
      aspect-ratio: 16/9; margin-bottom: 14px;
    }
    #dplayer { width: 100%; height: 100%; }
    .player-meta { margin-bottom: 28px; }
    .player-meta h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .player-meta p {
      font-size: 12px; color: var(--secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===================== GRID ===================== */
    .grid-section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 12.5px; font-weight: 700; color: var(--secondary);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 14px;
    }
    .grid-section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 3px;
    }
    .news-card {
      background: var(--surface);
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: flex; flex-direction: column;
      position: relative;
    }
    .news-card:hover { background: var(--elevated); border-left-color: var(--accent); }
    .news-card.playing { background: var(--elevated); border-left-color: var(--accent); }
    .news-card.playing .news-card-title { color: var(--accent); }

    .news-thumb {
      position: relative; width: 100%; aspect-ratio: 16/9;
      overflow: hidden; flex-shrink: 0;
      background: #08080a;
    }
    .news-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: saturate(0.92) contrast(1.03);
      transition: transform 0.4s ease;
    }
    .news-card:hover .news-thumb img { transform: scale(1.035); }
    .news-thumb-fallback {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
        #101013;
    }
    .news-thumb-fallback svg { width: 26px; height: 26px; color: var(--muted); }

    /* subtle vignette + scanline over every thumb for a broadcast-monitor feel */
    .news-thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
    .news-thumb-play {
      position: absolute; bottom: 7px; right: 8px;
      width: 24px; height: 24px; border-radius: 4px;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: translateY(3px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .news-card:hover .news-thumb-play { opacity: 1; transform: translateY(0); }
    .news-thumb-play svg { width: 11px; height: 11px; color: #fff; margin-left: 1px; }

    .news-thumb-date-tag {
      position: absolute; bottom: 7px; left: 8px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.2px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255,255,255,0.82);
    }

    .news-card-body { padding: 10px 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .news-card-cat {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase;
      color: var(--accent);
    }
    .news-card-title {
      font-size: 12.5px; font-weight: 600; color: var(--primary);
      line-height: 1.42;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color 0.15s ease;
    }

    .news-loading, .news-error, .news-empty {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px; color: var(--secondary); font-size: 13px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .news-loading svg { width: 26px; height: 26px; animation: spin 1s linear infinite; color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .news-error .error-title { font-weight: 700; color: var(--primary); font-size: 14px; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12.5px; font-weight: 700; color: var(--primary);
      background: var(--elevated); border: 1px solid var(--border-hi);
      padding: 8px 16px; border-radius: 100px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .retry-btn:hover { border-color: var(--accent); color: var(--accent); }
    .retry-btn svg { width: 14px; height: 14px; }

    /* ===================== FOOTER ===================== */
    .footer {
      max-width: 1200px; width: 100%; margin: 0 auto;
      padding: 20px; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      font-size: 11.5px; color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 640px) {
      .page-header-text h1 { font-size: 19px; }
      .page-header-icon { width: 44px; height: 44px; }
      .page-header-icon svg { width: 21px; height: 21px; }
      .news-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 11px; }
      .news-card-body { padding: 10px 11px 12px; }
      .news-card-title { font-size: 12px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span>Juche TV</span>
      </a>
      <ul id="menu">
        <li><a href="index.html">Channels</a></li>
        <li><a href="Recodings.html">Archives</a></li>
        <li>
          <button class="nav-btn" id="refreshBtn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <main class="main">
    <a href="Recodings.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Archives
    </a>

    <div class="page-header">
      <div class="page-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8l-2 4h12l-2-4z"/><circle cx="7" cy="14" r="2"/><line x1="13" y1="12" x2="19" y2="12"/><line x1="13" y1="16" x2="17" y2="16"/></svg>
      </div>
      <div class="page-header-text">
        <h1>News &amp; <span>Kim Jong Un Activities</span></h1>
        <p>Live-fetched bulletins and revolutionary activities coverage from KCTV.</p>
      </div>
    </div>

    <!-- Player -->
    <div class="player-shell" id="playerShell" style="display:none">
      <div id="dplayer"></div>
    </div>
    <div class="player-meta" id="playerMeta" style="display:none">
      <h3 id="playerMetaTitle">-</h3>
      <p id="playerMetaDate">-</p>
    </div>

    <div class="cat-tabs" id="catTabs" style="display:none"></div>

    <div class="news-grid" id="newsGrid">
      <div class="news-loading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
        <span>Fetching news &amp; activities…</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <span>Juche TV — Not affiliated with any broadcasting entity.</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.1/DPlayer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <script>
  (function() {
    const API_URL = 'https://kctv.koryofront.org/api/media-list';
    const MEDIA_BASE = 'https://kctv.koryofront.org';
    const THUMB_BASE = 'https://koryofront.org/api/kctv/thumb';

    const newsGrid = document.getElementById('newsGrid');
    const catTabs = document.getElementById('catTabs');
    const playerShell = document.getElementById('playerShell');
    const playerMeta = document.getElementById('playerMeta');
    const playerMetaTitle = document.getElementById('playerMetaTitle');
    const playerMetaDate = document.getElementById('playerMetaDate');
    const refreshBtn = document.getElementById('refreshBtn');

    let mediaData = {};
    let categories = [];
    let activeCat = 'all';
    let dp = null;

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function formatDate(d) {
      if (!d) return '';
      try {
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      } catch (e) { return d; }
    }

    function absoluteUrl(u) {
      if (!u) return '';
      return /^https?:\/\//i.test(u) ? u : MEDIA_BASE + (u.startsWith('/') ? u : '/' + u);
    }

    function thumbUrl(item) {
      // Thumbnail service takes the raw media path (not the full media host URL) plus a seek time.
      const path = item.path || item.url;
      if (!path) return null;
      return THUMB_BASE + '?path=' + encodeURIComponent(path) + '&t=5';
    }

    function flattenAll() {
      const all = [];
      categories.forEach(cat => (mediaData[cat] || []).forEach(item => all.push(item)));
      all.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (a.order || 0) - (b.order || 0));
      return all;
    }

    function cardHtml(item) {
      const videoUrl = absoluteUrl(item.url);
      const thumb = thumbUrl(item);
      const fallbackHtml = `<div class="news-thumb-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8l-2 4h12l-2-4z"/><circle cx="7" cy="14" r="2"/></svg></div>`;
      const thumbInner = thumb
        ? `<img src="${escHtml(thumb)}" alt="${escHtml(item.title)}" loading="lazy" style="display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">${fallbackHtml.replace('<div class="news-thumb-fallback">', '<div class="news-thumb-fallback" style="display:none">')}`
        : fallbackHtml;

      return `
        <div class="news-card" data-url="${escHtml(videoUrl)}" data-title="${escHtml(item.title)}" data-date="${escHtml(item.date || '')}" data-cat="${escHtml(item.category || '')}">
          <div class="news-thumb">
            ${thumbInner}
            <span class="news-thumb-date-tag">${formatDate(item.date)}</span>
            <div class="news-thumb-play"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
          </div>
          <div class="news-card-body">
            <div class="news-card-cat">${escHtml(item.category || 'News')}</div>
            <div class="news-card-title">${escHtml(item.title)}</div>
          </div>
        </div>`;
    }

    function renderGrid() {
      const items = activeCat === 'all' ? flattenAll() : (mediaData[activeCat] || []);
      if (!items.length) {
        newsGrid.innerHTML = '<div class="news-empty">No videos found in this category.</div>';
        return;
      }
      newsGrid.innerHTML = items.map(cardHtml).join('');
      newsGrid.querySelectorAll('.news-card').forEach(card => {
        card.addEventListener('click', () => playVideo(card));
      });
    }

    function renderTabs() {
      if (categories.length <= 1) { catTabs.style.display = 'none'; return; }
      catTabs.style.display = 'flex';
      const allCount = flattenAll().length;
      let html = `<button class="cat-tab ${activeCat === 'all' ? 'active' : ''}" data-cat="all">All<span class="cat-count">${allCount}</span></button>`;
      categories.forEach(cat => {
        const count = (mediaData[cat] || []).length;
        html += `<button class="cat-tab ${activeCat === cat ? 'active' : ''}" data-cat="${escHtml(cat)}">${escHtml(cat)}<span class="cat-count">${count}</span></button>`;
      });
      catTabs.innerHTML = html;
      catTabs.querySelectorAll('.cat-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          activeCat = tab.dataset.cat;
          catTabs.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t === tab));
          renderGrid();
        });
      });
    }

    // Removes DPlayer's long-press-to-speed-up behavior (mobile) entirely.
    function disableLongPress() {
      const wrap = document.getElementById('dplayer');
      if (!wrap) return;
      wrap.addEventListener('touchstart', function(e) { e.stopPropagation(); }, { capture: true, passive: true });
      wrap.addEventListener('contextmenu', function(e) { e.preventDefault(); }, { passive: false });
      setTimeout(() => {
        const video = wrap.querySelector('video');
        if (!video) return;
        video.addEventListener('contextmenu', function(e) { e.stopPropagation(); e.preventDefault(); }, { passive: false, capture: true });
      }, 600);
    }

    function playVideo(card) {
      const url = card.dataset.url, title = card.dataset.title, date = card.dataset.date, cat = card.dataset.cat;

      newsGrid.querySelectorAll('.news-card').forEach(c => c.classList.toggle('playing', c === card));

      playerMetaTitle.textContent = title;
      playerMetaDate.textContent = (cat || 'News') + (date ? ' · ' + formatDate(date) : '');
      playerShell.style.display = '';
      playerMeta.style.display = '';
      playerShell.scrollIntoView({ behavior: 'smooth', block: 'start' });

      if (dp) { try { dp.destroy(); } catch (e) {} dp = null; }
      const container = document.getElementById('dplayer');
      container.innerHTML = '';

      dp = new DPlayer({
        container: container,
        autoplay: true,
        theme: '#E8212A',
        lang: 'en',
        airplay: true,
        hotkey: true,
        preload: 'metadata',
        volume: 0.7,
        mutex: true,
        playbackSpeed: [0.5, 0.75, 1, 1.25, 1.5, 2],
        video: { url: url, type: 'auto' },
      });
      disableLongPress();
    }

    async function fetchNews() {
      newsGrid.innerHTML = `
        <div class="news-loading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg>
          <span>Fetching news &amp; activities…</span>
        </div>`;
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        mediaData = data || {};
        categories = Object.keys(mediaData);
        if (!categories.length) {
          newsGrid.innerHTML = '<div class="news-empty">No videos found.</div>';
          return;
        }
        renderTabs();
        renderGrid();
      } catch (e) {
        console.error('Failed to fetch news/activities:', e);
        newsGrid.innerHTML = `
          <div class="news-error">
            <div class="error-title">Unable to load news &amp; activities</div>
            <div>Check your connection and try again.</div>
            <button class="retry-btn" id="retryBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
              Retry
            </button>
          </div>`;
        const retryBtn = document.getElementById('retryBtn');
        if (retryBtn) retryBtn.addEventListener('click', fetchNews);
      }
    }

    refreshBtn.addEventListener('click', fetchNews);
    fetchNews();
  })();
  </script>
</body>
</html>
