<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D0D0F">
  <title>Juche TV - Magazines</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg: #0D0D0F;
      --surface: #16161A;
      --surface2: #1E1E24;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.13);
      --primary: #F5F5F7;
      --secondary: #8A8A96;
      --tertiary: #3A3A44;
      --red: #FF3B30;
      --green: #30D158;
      --blue: #0A84FF;
      --yellow: #FFD60A;
      --tint: #FF2D55;
      --tint2: #FF6B35;
      --purple: #AF52DE;
      --radius-sm: 12px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--primary);
      text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--tint), var(--tint2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(255,45,85,0.45);
    }
    .nav-right { display: flex; align-items: center; gap: 4px; }
    .nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--surface2);
      color: var(--secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .nav-btn:hover { background: var(--border-bright); color: var(--primary); }
    .nav-btn svg { width: 17px; height: 17px; }

    .main {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 110px;
    }

    .hero { margin-bottom: 20px; }
    .hero-eyebrow {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--purple);
      margin-bottom: 6px;
    }
    .hero h1 {
      font-size: 26px; font-weight: 900;
      letter-spacing: -0.7px; line-height: 1.2;
      margin-bottom: 6px;
    }
    .hero p { font-size: 13px; color: var(--secondary); line-height: 1.6; }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-label { font-size: 11px; font-weight: 700; color: var(--secondary); white-space: nowrap; flex-shrink: 0; }
    .sort-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      border: 0.5px solid var(--border-bright);
      background: var(--surface);
      color: var(--secondary);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-family: inherit;
    }
    .sort-btn:hover { border-color: rgba(175,82,222,0.4); color: var(--purple); }
    .sort-btn.active {
      background: rgba(175,82,222,0.15);
      border-color: rgba(175,82,222,0.45);
      color: var(--purple);
    }

    .mag-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mag-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s, box-shadow 0.25s;
      position: relative;
    }
    .mag-card:hover {
      border-color: rgba(175,82,222,0.3);
      box-shadow: 0 0 0 1px rgba(175,82,222,0.14), 0 8px 28px rgba(0,0,0,0.3);
    }
    .mag-card-inner { display: flex; align-items: flex-start; gap: 14px; padding: 16px; }

    .mag-cover {
      width: 68px; height: 90px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0a2e, #2e0a1a);
      display: flex; align-items: center; justify-content: center;
      border: 0.5px solid rgba(175,82,222,0.2);
      position: relative;
    }
    .mag-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .mag-cover-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 4px;
    }
    .mag-cover-placeholder span {
      font-size: 8px; font-weight: 700;
      text-align: center;
      color: rgba(175,82,222,0.7);
      line-height: 1.3;
      word-break: break-word;
    }

    .mag-body { flex: 1; min-width: 0; }
    .mag-meta {
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
      flex-wrap: wrap;
    }
    .mag-type-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 100px;
      background: rgba(175,82,222,0.14);
      color: var(--purple);
      border: 0.5px solid rgba(175,82,222,0.28);
    }
    .mag-new-badge {
      font-size: 10px; font-weight: 800;
      padding: 2px 8px; border-radius: 100px;
      background: rgba(255,214,10,0.14);
      color: var(--yellow);
      border: 0.5px solid rgba(255,214,10,0.3);
      display: flex; align-items: center; gap: 4px;
    }
    .mag-new-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 2s infinite;
    }
    .mag-title {
      font-size: 14px; font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
      line-height: 1.35;
    }
    .mag-date { font-size: 11px; color: var(--secondary); margin-bottom: 6px; }
    .mag-desc {
      font-size: 11px; color: var(--secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .mag-actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px 14px;
      border-top: 0.5px solid var(--border);
    }
    .mag-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 12px; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      text-decoration: none;
    }
    .mag-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .mag-btn-download {
      background: rgba(175,82,222,0.14);
      color: var(--purple);
      border: 0.5px solid rgba(175,82,222,0.3);
    }
    .mag-btn-download:hover { background: rgba(175,82,222,0.25); }
    .mag-btn-share {
      background: var(--surface2);
      color: var(--secondary);
      border: 0.5px solid var(--border-bright);
      flex: 0 0 auto;
      padding: 9px 14px;
    }
    .mag-btn-share:hover { color: var(--primary); border-color: var(--border-bright); }

    /* ─── SKELETON LOADING ─── */
    .skeleton-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    .skeleton-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .skeleton-cover {
      width: 68px; height: 90px;
      flex-shrink: 0;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a35 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; }
    .skeleton-badge {
      width: 60px; height: 18px;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a35 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-title {
      width: 70%; height: 16px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a35 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-title.short { width: 45%; }
    .skeleton-date {
      width: 40%; height: 12px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a35 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-actions {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }
    .skeleton-btn {
      flex: 1; height: 36px;
      border-radius: var(--radius-sm);
      background: linear-gradient(90deg, var(--surface2) 25%, #2a2a35 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-btn.small { flex: 0 0 auto; width: 50px; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ─── ERROR STATE ─── */
    .error-state {
      background: rgba(255,59,48,0.08);
      border: 0.5px solid rgba(255,59,48,0.22);
      border-radius: var(--radius-lg);
      padding: 28px 20px;
      text-align: center;
    }
    .error-state p { font-size: 13px; color: var(--secondary); margin-top: 8px; }
    .error-state button {
      margin-top: 16px;
      padding: 9px 20px;
      border-radius: 100px;
      border: 0.5px solid rgba(255,59,48,0.3);
      background: rgba(255,59,48,0.1);
      color: var(--red);
      font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }

    .empty-state {
      text-align: center; padding: 50px 20px;
      color: var(--secondary); font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 0.5px solid var(--border-bright);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px; font-weight: 600;
      color: var(--primary);
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap;
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(22,22,26,0.92);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-top: 0.5px solid var(--border);
      padding: 10px 0 24px;
    }
    .tab-bar-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      justify-content: space-around;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600;
      color: var(--secondary);
      cursor: pointer;
      transition: color 0.2s;
      padding: 2px 16px;
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    .tab-item.active { color: var(--purple); }
    .tab-item svg { width: 22px; height: 22px; }
    .tab-item:hover { color: var(--primary); }
    .tab-mag-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .tab-new-dot {
      position: absolute; top: -2px; right: -5px;
      width: 7px; height: 7px;
      background: var(--yellow);
      border-radius: 50%;
      border: 1.5px solid #16161a;
      box-shadow: 0 0 6px rgba(255,214,10,0.7);
    }

    .fade-in { opacity: 0; transform: translateY(14px); animation: fadeUp 0.55s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
    .d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .count-chip {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 600; color: var(--secondary);
      margin-bottom: 14px;
    }
    .count-chip strong { color: var(--purple); margin-right: 4px; }

    .mag-card.shared-highlight {
      border-color: rgba(255,214,10,0.5);
      box-shadow: 0 0 0 2px rgba(255,214,10,0.15), 0 8px 32px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </div>
        Juche TV
      </a>
      <div class="nav-right">
        <a href="index.html" class="nav-btn" title="Home">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </a>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="hero fade-in d1">
      <div class="hero-eyebrow">Magazines</div>
      <h1>DPRK Periodicals</h1>
      <p>Browse, sort &amp; download official North Korean publications directly.</p>
    </div>

    <div class="sort-bar fade-in d2">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" data-sort="newest" onclick="setSort(this,'newest')">Newest First</button>
      <button class="sort-btn" data-sort="oldest" onclick="setSort(this,'oldest')">Oldest First</button>
      <button class="sort-btn" data-sort="alpha" onclick="setSort(this,'alpha')">A–Z</button>
      <button class="sort-btn" data-sort="alpha-desc" onclick="setSort(this,'alpha-desc')">Z–A</button>
      <button class="sort-btn" data-sort="type" onclick="setSort(this,'type')">By Type</button>
    </div>

    <div class="count-chip fade-in d2" id="countChip"></div>

    <div class="mag-grid" id="magGrid"></div>

  </main>

  <div class="toast" id="toast"></div>

  <div class="tab-bar">
    <div class="tab-bar-inner">
      <a href="index.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Home
      </a>
      <a href="schedules.html" class="tab-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="3"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Schedule
      </a>
      <a href="Magazine.html" class="tab-item active">
        <span class="tab-mag-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span class="tab-new-dot"></span>
        </span>
        Magazines
      </a>
    </div>
  </div>

  <script>
    const PROXY_API = 'https://juche-tv-epg-api.vercel.app/api/bloxyplaytv/magazines';
    let allMags = [];
    let currentSort = 'newest';

    const BASE = 'https://koryofront.org';

    function normalize(raw) {
      const id = raw.id;
      const slug = raw.slug || '';
      const fileName = raw.fileName || '';
      const pdfUrl = id ? `${BASE}/api/periodicals/${id}/file` : '';
      const coverImg = (raw.hasThumb && id) ? `${BASE}/api/periodicals/${id}/thumb` : '';
      return {
        ...raw,
        _pdfUrl: pdfUrl,
        _coverImg: coverImg,
        _dateStr: raw.issueDate || '',
        _title: raw.publication || '',
        _type: raw.type || ''
      };
    }

    function isNew(dateStr) {
      if (!dateStr) return false;
      const d = new Date(dateStr);
      const now = new Date();
      return !isNaN(d) && (now - d) < 30 * 24 * 60 * 60 * 1000;
    }

    function makeToken(mag) {
      return btoa(encodeURIComponent(String(mag.id || mag.slug || mag._title || '')));
    }

    function sortMags(list, mode) {
      const copy = [...list];
      if (mode === 'newest')     return copy.sort((a, b) => new Date(b._dateStr || 0) - new Date(a._dateStr || 0));
      if (mode === 'oldest')     return copy.sort((a, b) => new Date(a._dateStr || 0) - new Date(b._dateStr || 0));
      if (mode === 'alpha')      return copy.sort((a, b) => (a._title || '').localeCompare(b._title || ''));
      if (mode === 'alpha-desc') return copy.sort((a, b) => (b._title || '').localeCompare(a._title || ''));
      if (mode === 'type')       return copy.sort((a, b) => (a._type || '').localeCompare(b._type || ''));
      return copy;
    }

    function fmtDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function renderSkeletons(count) {
      const grid = document.getElementById('magGrid');
      let html = '';
      for (let i = 0; i < count; i++) {
        html += `
          <div class="skeleton-card">
            <div class="skeleton-row">
              <div class="skeleton-cover"></div>
              <div class="skeleton-body">
                <div class="skeleton-badge"></div>
                <div class="skeleton-title"></div>
                <div class="skeleton-title short"></div>
                <div class="skeleton-date"></div>
              </div>
            </div>
            <div class="skeleton-actions">
              <div class="skeleton-btn"></div>
              <div class="skeleton-btn small"></div>
            </div>
          </div>`;
      }
      grid.innerHTML = html;
    }

    function renderGrid(list) {
      const grid = document.getElementById('magGrid');
      const chip = document.getElementById('countChip');

      if (!list.length) {
        grid.innerHTML = '<div class="empty-state">No magazines found.</div>';
        chip.innerHTML = '';
        return;
      }

      chip.innerHTML = `<strong>${list.length}</strong> publication${list.length !== 1 ? 's' : ''}`;

      const urlParams = new URLSearchParams(window.location.search);
      const sharedToken = urlParams.get('token');
      let sharedId = null;
      if (sharedToken) {
        try { sharedId = decodeURIComponent(atob(sharedToken)); } catch(e) {}
      }

      grid.innerHTML = list.map((mag, i) => {
        const { _pdfUrl: pdfUrl, _coverImg: coverImg, _dateStr: dateStr,
                _title: title, _type: type } = mag;
        const magId = String(mag.id || mag.slug || title);
        const token = makeToken(mag);
        const shareUrl = window.location.origin + window.location.pathname + '?token=' + token;
        const newPub = isNew(dateStr);
        const isShared = sharedId && sharedId === magId;
        const safeTitle = title.replace(/'/g, "\'").replace(/"/g, '&quot;');

        return `
          <div class="mag-card${isShared ? ' shared-highlight' : ''}" id="mag-${i}"
               style="animation:fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) ${Math.min(i*0.04,0.4)}s both;">
            <div class="mag-card-inner">
              <div class="mag-cover">
                ${coverImg
                  ? `<img src="${coverImg}" alt="${safeTitle}" loading="lazy"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                  : ''}
                <div class="mag-cover-placeholder" ${coverImg ? 'style="display:none"' : ''}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                       stroke="rgba(175,82,222,0.6)" stroke-width="1.6" stroke-linecap="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                  </svg>
                  <span>${title.substring(0,20)}</span>
                </div>
              </div>
              <div class="mag-body">
                <div class="mag-meta">
                  ${type ? `<span class="mag-type-badge">${type}</span>` : ''}
                  ${newPub ? `<span class="mag-new-badge">New</span>` : ''}
                </div>
                <div class="mag-title">${title}</div>
                ${dateStr ? `<div class="mag-date">${fmtDate(dateStr)}</div>` : ''}
                ${mag.fileName ? `<div class="mag-desc" style="font-size:10px;opacity:.45;">${mag.fileName}</div>` : ''}
              </div>
            </div>
            <div class="mag-actions">
              ${pdfUrl
                ? `<a href="${pdfUrl}" class="mag-btn mag-btn-download" target="_blank" rel="noopener"
                      download="${mag.fileName || title + '.pdf'}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                         stroke-linecap="round" stroke-linejoin="round">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="7 10 12 15 17 10"/>
                      <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download PDF
                  </a>`
                : `<span class="mag-btn mag-btn-download" style="opacity:.35;cursor:not-allowed;">No PDF</span>`
              }
              <button class="mag-btn mag-btn-share" title="Share"
                      onclick="shareMag('${shareUrl}','${safeTitle}')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
              </button>
            </div>
          </div>`;
      }).join('');

      if (sharedId) {
        const idx = list.findIndex(m => String(m.id || m.slug || m._title) === sharedId);
        if (idx >= 0) {
          setTimeout(() => document.getElementById('mag-' + idx)
            ?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 700);
        }
      }
    }

    function setSort(btn, mode) {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = mode;
      renderGrid(sortMags(allMags, currentSort));
    }

    async function shareMag(url, title) {
      if (navigator.share) {
        try { await navigator.share({ title: title + ' — Juche TV', url }); return; } catch(e) {}
      }
      try {
        await navigator.clipboard.writeText(url);
        showToast('📋 Link copied!');
      } catch(e) {
        prompt('Copy this link:', url);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    async function fetchMags() {
      const grid = document.getElementById('magGrid');
      renderSkeletons(6);
      try {
        const res = await fetch(PROXY_API, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        let raw = Array.isArray(data) ? data
                : Array.isArray(data.results) ? data.results
                : Array.isArray(data.data) ? data.data
                : (Object.values(data).find(v => Array.isArray(v)) || []);
        allMags = raw.map(normalize);
        renderGrid(sortMags(allMags, currentSort));
      } catch (err) {
        grid.innerHTML = `
          <div class="error-state">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FF3B30"
                 stroke-width="1.8" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <circle cx="12" cy="16" r="1" fill="#FF3B30"/>
            </svg>
            <p>Could not load magazines.<br>
               <small style="opacity:.5">Check your connection or try again.</small></p>
            <button onclick="fetchMags()">Try Again</button>
          </div>`;
      }
    }

    fetchMags();
  </script>
</body>
</html>
