<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0A0C">
  <title>Juche TV — Checking your browser</title>
  <script src="https://www.google.com/recaptcha/api.js?render=6LdpEjgtAAAAAGhCt5ufm_pfBzm0Hu7BXp5h_ier"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0A0A0C;
      --card:     #111114;
      --lift:     #18181C;
      --line:     rgba(255,255,255,0.06);
      --line2:    rgba(255,255,255,0.11);
      --txt:      #ECECF0;
      --muted:    #6A6A78;
      --dim:      #3A3A46;
      --red:      #E8172C;
      --red2:     #FF5533;
      --green:    #22C55E;
      --font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--txt);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── NOISE TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 1;
    }

    /* ── AMBIENT LIGHT ── */
    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      overflow: hidden;
    }
    .ambient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      will-change: transform, opacity;
    }
    .blob-1 {
      width: 520px; height: 520px;
      top: -160px; left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(232,23,44,0.09) 0%, transparent 70%);
      animation: drift1 8s ease-in-out infinite;
    }
    .blob-2 {
      width: 300px; height: 300px;
      bottom: 0; right: -60px;
      background: radial-gradient(circle, rgba(94,60,220,0.06) 0%, transparent 70%);
      animation: drift2 10s ease-in-out infinite;
    }
    .blob-3 {
      width: 200px; height: 200px;
      bottom: 10%; left: -40px;
      background: radial-gradient(circle, rgba(232,23,44,0.05) 0%, transparent 70%);
      animation: drift2 7s ease-in-out infinite reverse;
    }
    @keyframes drift1 {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) translateY(0px); }
      50% { opacity: 1; transform: translateX(-50%) translateY(-20px); }
    }
    @keyframes drift2 {
      0%, 100% { opacity: 0.5; transform: translateY(0px); }
      50% { opacity: 0.9; transform: translateY(-14px); }
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line2);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        0 24px 64px rgba(0,0,0,0.55),
        0 4px 16px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(18px) scale(0.99);
      animation: rise 0.55s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }
    @keyframes rise {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── CARD TOP STRIPE ── */
    .card-stripe {
      height: 3px;
      background: linear-gradient(90deg, var(--red) 0%, var(--red2) 50%, transparent 100%);
      position: relative;
      overflow: hidden;
    }
    .card-stripe::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%);
      animation: shimmer 2.5s ease-in-out infinite;
      transform: translateX(-100%);
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      60%, 100% { transform: translateX(200%); }
    }

    /* ── CARD BODY ── */
    .card-body {
      padding: 32px 32px 28px;
    }

    /* ── SITE ROW ── */
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .site-id {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .site-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--red), var(--red2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(232,23,44,0.4);
      flex-shrink: 0;
    }
    .site-icon svg { width: 17px; height: 17px; fill: #fff; }
    .site-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.3px;
    }
    .site-url {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
      font-weight: 500;
    }
    .secure-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      padding: 5px 10px;
      border-radius: 100px;
    }
    .secure-badge svg { width: 10px; height: 10px; }
    .secure-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── MAIN AREA ── */
    .main-area {
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── SCAN ANIMATION ── */
    .scan-wrap {
      position: relative;
      width: 80px; height: 80px;
      margin: 0 auto 20px;
    }
    .scan-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--line2);
    }
    .scan-ring-spin {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--red);
      border-right-color: rgba(232,23,44,0.3);
      animation: rotateSpin 1.1s linear infinite;
    }
    .scan-ring-outer {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(232,23,44,0.08);
      animation: pulseRing 2s ease-in-out infinite;
    }
    .scan-ring-outer2 {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 1px solid rgba(232,23,44,0.04);
      animation: pulseRing 2s ease-in-out infinite 0.5s;
    }
    @keyframes rotateSpin { to { transform: rotate(360deg); } }
    @keyframes pulseRing {
      0%, 100% { opacity: 0; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1); }
    }
    .scan-inner {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: rgba(232,23,44,0.07);
      display: flex; align-items: center; justify-content: center;
    }
    /* Scan line sweep */
    .scan-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent 70%, rgba(232,23,44,0.25) 100%);
      animation: rotateSpin 1.1s linear infinite;
    }
    .scan-inner svg {
      width: 22px; height: 22px;
      color: var(--red);
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 6px rgba(232,23,44,0.5));
    }

    /* Done state */
    .scan-wrap.done .scan-ring-spin { display: none; }
    .scan-wrap.done .scan-inner { background: rgba(34,197,94,0.1); animation: popIn 0.4s cubic-bezier(0.22,1,0.36,1); }
    .scan-wrap.done .scan-inner svg { color: var(--green); filter: drop-shadow(0 0 6px rgba(34,197,94,0.5)); }
    .scan-wrap.done .scan-inner::after { display: none; }
    .scan-wrap.done .scan-ring { border-color: rgba(34,197,94,0.2); }
    @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }

    .check-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--txt);
      margin-bottom: 6px;
    }
    .check-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 260px;
      margin: 0 auto;
    }

    /* ── PROGRESS SECTION ── */
    .progress-section {
      margin-bottom: 20px;
    }
    .progress-track {
      height: 3px;
      background: var(--lift);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--red), var(--red2));
      border-radius: 100px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .progress-fill.has-width::after { opacity: 1; }

    /* ── STEPS ── */
    .steps { display: flex; flex-direction: column; gap: 2px; }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 10px;
      transition: background 0.25s ease, opacity 0.3s ease;
      opacity: 0.35;
    }
    .step.active {
      opacity: 1;
      background: rgba(232,23,44,0.06);
    }
    .step.done {
      opacity: 0.55;
      background: transparent;
    }
    .step-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--dim);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.3s ease;
      font-size: 10px;
    }
    .step.active .step-dot {
      border-color: var(--red);
      background: rgba(232,23,44,0.12);
    }
    .step.done .step-dot {
      border-color: var(--green);
      background: rgba(34,197,94,0.1);
      color: var(--green);
    }
    .step-mini-spin {
      width: 8px; height: 8px;
      border: 1.5px solid rgba(232,23,44,0.3);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: rotateSpin 0.7s linear infinite;
    }
    .step-txt {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--txt);
      letter-spacing: -0.1px;
    }
    .step-state {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2px;
    }
    .step.active .step-state { color: var(--red); }
    .step.done .step-state { color: var(--green); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--line);
      margin: 20px 0 16px;
    }

    /* ── FOOTER ROW ── */
    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-left {
      font-size: 11px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .footer-left svg { width: 11px; height: 11px; }
    .footer-right {
      font-size: 10px;
      color: var(--dim);
      font-weight: 500;
    }

    /* ── STATUS LINE ── */
    .status-line {
      font-size: 11px;
      color: var(--dim);
      text-align: center;
      margin-top: 14px;
      min-height: 16px;
      transition: color 0.3s;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.1px;
    }
    .status-line.error { color: var(--red); }

    /* ── FADE OUT ── */
    body.leaving { animation: leaveOut 0.45s ease forwards; }
    @keyframes leaveOut { to { opacity: 0; transform: scale(0.98); } }

    .grecaptcha-badge { visibility: hidden !important; }
  </style>
</head>
<body>

  <div class="ambient">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>
  </div>

  <div class="page">
    <div class="card">

      <!-- Top stripe -->
      <div class="card-stripe"></div>

      <div class="card-body">

        <!-- Site row -->
        <div class="site-row">
          <div class="site-id">
            <div class="site-icon">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div>
              <div class="site-name">Juche TV</div>
              <div class="site-url">juche-tv.vercel.app</div>
            </div>
          </div>
          <div class="secure-badge">
            <div class="secure-dot"></div>
            Secure
          </div>
        </div>

        <!-- Main scan area -->
        <div class="main-area">
          <div class="scan-wrap" id="scanWrap">
            <div class="scan-ring-outer2"></div>
            <div class="scan-ring-outer"></div>
            <div class="scan-ring"></div>
            <div class="scan-ring-spin"></div>
            <div class="scan-inner">
              <!-- Shield icon while checking, checkmark when done -->
              <svg id="scanIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
          </div>

          <div class="check-title" id="mainTitle">Checking your browser</div>
          <div class="check-sub" id="mainSub">This takes just a moment. Please don't close this tab.</div>
        </div>

        <!-- Progress -->
        <div class="progress-section">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <div class="steps">
            <div class="step active" id="step1">
              <div class="step-dot" id="step1-dot"><div class="step-mini-spin"></div></div>
              <div class="step-txt">Connecting to security service</div>
              <div class="step-state" id="step1-state">Running</div>
            </div>
            <div class="step" id="step2">
              <div class="step-dot" id="step2-dot"></div>
              <div class="step-txt">Verifying browser fingerprint</div>
              <div class="step-state" id="step2-state">Waiting</div>
            </div>
            <div class="step" id="step3">
              <div class="step-dot" id="step3-dot"></div>
              <div class="step-txt">Issuing access token</div>
              <div class="step-state" id="step3-state">Waiting</div>
            </div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Footer -->
        <div class="footer-row">
          <div class="footer-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Protected by Google reCAPTCHA v3
          </div>
          <div class="footer-right">Ray ID: <span id="rayId">—</span></div>
        </div>

      </div>
    </div>

    <div class="status-line" id="statusLine">Initialising…</div>
  </div>

  <script>
    const SITE_KEY = '6LdpEjgtAAAAAGhCt5ufm_pfBzm0Hu7BXp5h_ier';
    const TOKEN_KEY = 'jtv_token';
    const nextUrl = new URLSearchParams(window.location.search).get('next') || 'index.html';

    // Generate a random Ray ID for authenticity
    function genRayId() {
      const chars = '0123456789abcdef';
      return Array.from({length: 16}, () => chars[Math.floor(Math.random() * 16)]).join('');
    }
    document.getElementById('rayId').textContent = genRayId();

    const fill = document.getElementById('progressFill');
    const statusLine = document.getElementById('statusLine');

    function setProgress(pct) {
      fill.style.width = pct + '%';
      if (pct > 0) fill.classList.add('has-width');
    }

    function setStatus(msg, isError) {
      statusLine.textContent = msg;
      statusLine.className = 'status-line' + (isError ? ' error' : '');
    }

    function stepDone(n, label) {
      const step = document.getElementById('step' + n);
      const dot = document.getElementById('step' + n + '-dot');
      const state = document.getElementById('step' + n + '-state');
      step.classList.remove('active');
      step.classList.add('done');
      dot.innerHTML = '✓';
      state.textContent = label || 'Done';
    }

    function stepActivate(n, stateLabel) {
      const step = document.getElementById('step' + n);
      const dot = document.getElementById('step' + n + '-dot');
      const state = document.getElementById('step' + n + '-state');
      step.classList.add('active');
      dot.innerHTML = '<div class="step-mini-spin"></div>';
      state.textContent = stateLabel || 'Running';
    }

    function generateToken() {
      const arr = new Uint8Array(32);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function goNow(token) {
      document.body.classList.add('leaving');
      const dest = new URL(nextUrl, window.location.origin);
      dest.searchParams.set('auth', token);
      setTimeout(() => { window.location.href = dest.toString(); }, 450);
    }

    function showSuccess() {
      const wrap = document.getElementById('scanWrap');
      const icon = document.getElementById('scanIcon');
      wrap.classList.add('done');
      icon.innerHTML = '<polyline points="20 6 9 17 4 12" stroke-width="2.2"/>';
      document.getElementById('mainTitle').textContent = 'All checks passed';
      document.getElementById('mainSub').textContent = 'Redirecting you to Juche TV now…';
    }

    window.addEventListener('load', () => {
      setProgress(8);
      setStatus('Loading reCAPTCHA…');

      setTimeout(() => {
        setProgress(28);
        setStatus('Connecting to Google reCAPTCHA…');

        grecaptcha.ready(() => {
          setProgress(46);
          setStatus('Running browser verification…');

          grecaptcha.execute(SITE_KEY, { action: 'pageview' }).then(rcToken => {

            stepDone(1, 'Connected');
            stepActivate(2, 'Checking');
            setProgress(64);
            setStatus('Analysing browser fingerprint…');

            setTimeout(() => {
              stepDone(2, 'Verified');
              stepActivate(3, 'Issuing');
              setProgress(84);
              setStatus('Generating secure access token…');

              const token = generateToken();
              sessionStorage.setItem(TOKEN_KEY, token);

              setTimeout(() => {
                stepDone(3, 'Issued');
                setProgress(100);
                setStatus('Access granted. Redirecting…');
                showSuccess();

                setTimeout(() => goNow(token), 900);
              }, 650);

            }, 850);

          }).catch(() => {
            setStatus('Verification failed — please refresh the page.', true);
            setProgress(0);
          });
        });

      }, 700);
    });
  </script>

</body>
</html>
